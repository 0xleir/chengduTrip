  <style>:root {
  --bg: #f7f5f0;
  --panel: #ffffff;
  --ink: #2b2b2b;
  --ink-soft: #6b6b6b;
  --line: #e6e2d8;
  --accent: #c8463c;
  --accent-soft: #f3d9d6;
  --history: #b8860b;
  --culture: #c8463c;
  --nature: #4a8a4a;
  --modern: #3b6fa5;
  --shadow: 0 6px 24px rgba(40, 30, 20, 0.08);
  --radius: 10px;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
               "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  color: var(--ink);
  background: var(--bg);
  overflow: hidden;
}

.topbar {
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  background: var(--panel);
  border-bottom: 1px solid var(--line);
  box-shadow: var(--shadow);
  z-index: 1000;
  position: relative;
}

.brand { display: flex; align-items: center; gap: 10px; }
.brand .logo { font-size: 22px; }
.brand h1 {
  margin: 0;
  font-size: 17px;
  font-weight: 600;
  letter-spacing: 0.3px;
}

.controls { display: flex; align-items: center; gap: 12px; }

.filter-chips { display: flex; gap: 6px; flex-wrap: wrap; }

.chip {
  font-size: 12px;
  padding: 5px 11px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: #fafaf6;
  color: var(--ink-soft);
  cursor: pointer;
  transition: all 0.15s;
  user-select: none;
}
.chip:hover { color: var(--ink); border-color: #cfcabd; }
.chip.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

.layer-toggle {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--ink-soft);
  cursor: pointer;
  user-select: none;
  padding: 4px 8px;
  border: 1px solid var(--line);
  border-radius: 6px;
  background: #fafaf6;
}
.layer-toggle:hover { color: var(--ink); border-color: #cfcabd; }
.layer-toggle input { margin: 0; cursor: pointer; }

.lang-btn {
  font-size: 13px;
  font-weight: 600;
  padding: 6px 14px;
  border-radius: 6px;
  border: 1px solid var(--line);
  background: #fff;
  color: var(--ink);
  cursor: pointer;
  transition: all 0.15s;
}
.lang-btn:hover { border-color: var(--accent); color: var(--accent); }

.layout {
  display: flex;
  height: calc(100vh - 56px);
}

.sidebar {
  width: 340px;
  flex-shrink: 0;
  background: var(--panel);
  border-right: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-head {
  padding: 14px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  border-bottom: 1px solid var(--line);
  user-select: none;
}
.sidebar-chevron {
  display: none;
  font-size: 14px;
  color: var(--ink-soft);
  transition: transform 0.25s;
}
.sidebar.collapsed .sidebar-chevron {
  transform: rotate(180deg);
}
.sidebar-head h2 {
  margin: 0;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.3px;
  text-transform: uppercase;
  color: var(--ink-soft);
}
.count {
  font-size: 12px;
  background: var(--accent-soft);
  color: var(--accent);
  padding: 2px 9px;
  border-radius: 999px;
  font-weight: 600;
}

.attraction-list {
  list-style: none;
  margin: 0;
  padding: 8px;
  overflow-y: auto;
  flex: 1;
}

.attraction-item {
  display: block;
  padding: 12px 14px;
  margin-bottom: 6px;
  border-radius: var(--radius);
  cursor: pointer;
  border: 1px solid transparent;
  transition: all 0.15s;
}
.attraction-item:hover {
  background: #faf6ee;
  border-color: var(--line);
}
.attraction-item.active {
  background: var(--accent-soft);
  border-color: var(--accent);
}

.item-row {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 8px;
}
.item-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--ink);
  line-height: 1.3;
}
.item-city {
  font-size: 11px;
  color: var(--ink-soft);
  white-space: nowrap;
}
.item-tag {
  display: inline-block;
  font-size: 10px;
  padding: 2px 7px;
  border-radius: 999px;
  background: #f0ece0;
  color: var(--ink-soft);
  margin-top: 6px;
  text-transform: uppercase;
  letter-spacing: 0.4px;
}
.item-tag.history { background: #f7ecd0; color: #8a6608; }
.item-tag.culture { background: #f7d9d6; color: #a3342b; }
.item-tag.nature  { background: #d9ecd9; color: #3b6f3b; }
.item-tag.modern  { background: #d8e4f0; color: #2e598a; }

.sidebar-foot {
  padding: 10px 18px;
  font-size: 11px;
  color: var(--ink-soft);
  border-top: 1px solid var(--line);
  display: flex;
  gap: 6px;
  background: #fafaf6;
}

.map-wrap { flex: 1; position: relative; }
#map {
  width: 100%;
  height: 100%;
  background: #dde6ef;
}

.popup-card {
  font-family: inherit;
  min-width: 220px;
  max-width: 280px;
}
.popup-card h3 {
  margin: 0 0 4px 0;
  font-size: 15px;
  color: var(--accent);
}
.popup-card .popup-city {
  font-size: 11px;
  color: var(--ink-soft);
  margin-bottom: 8px;
}
.popup-card p {
  margin: 0 0 8px 0;
  font-size: 12.5px;
  line-height: 1.55;
  color: var(--ink);
}
.popup-card .popup-tips {
  margin-top: 8px;
  padding: 7px 9px;
  background: #faf6ee;
  border-left: 3px solid var(--accent);
  font-size: 11.5px;
  line-height: 1.5;
  color: var(--ink-soft);
}

.popup-rail {
  margin-top: 10px;
  padding: 8px 10px;
  background: #f3f7fb;
  border: 1px solid #d6e2ee;
  border-radius: 6px;
  font-size: 11.5px;
  line-height: 1.55;
  color: var(--ink);
}
.popup-rail .rail-head {
  font-weight: 700;
  font-size: 12px;
  color: #2e598a;
  margin-bottom: 4px;
}
.popup-rail .rail-row { margin: 1px 0; }
.popup-rail .rail-key {
  display: inline-block;
  min-width: 44px;
  color: var(--ink-soft);
  margin-right: 6px;
}
.popup-rail .rail-note {
  margin-top: 5px;
  color: var(--ink-soft);
  font-size: 10.5px;
  font-style: italic;
}
.popup-rail.no-rail {
  background: #fdf6ec;
  border-color: #ecdcb6;
  color: #7a5a18;
  font-weight: 500;
}

.popup-metro {
  margin-top: 10px;
  padding: 8px 10px;
  background: #f5f7f5;
  border: 1px solid #d8e0d8;
  border-radius: 6px;
  font-size: 11.5px;
  line-height: 1.55;
}
.popup-metro .metro-head {
  font-weight: 700;
  font-size: 12px;
  color: #3b6f3b;
  margin-bottom: 6px;
}
.metro-row { margin-bottom: 6px; }
.metro-row:last-child { margin-bottom: 0; }
.metro-row-main {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.metro-station {
  font-weight: 600;
  color: var(--ink);
}
.metro-walk {
  margin-top: 2px;
  margin-left: 2px;
  color: var(--ink-soft);
  font-size: 11px;
}
.metro-line-pill {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 22px;
  height: 18px;
  padding: 0 6px;
  border-radius: 9px;
  font-size: 11px;
  font-weight: 700;
  color: #fff;
  background: #888;
}
.metro-line-1 { background: #00a0e9; }
.metro-line-2 { background: #ff6700; }
.metro-line-3 { background: #d62c2c; }
.metro-line-4 { background: #00a350; }
.metro-line-5 { background: #9b3a8e; }
.metro-line-6 { background: #c9a063; }
.metro-line-7 { background: #4d4d4d; }
.metro-line-8 { background: #6cc24a; }
.metro-line-9 { background: #e8d600; color: #4a4a00; }
.metro-line-10 { background: #b48ed3; }
.metro-line-17 { background: #8fc8e8; }
.metro-line-18 { background: #d44a8c; }
.metro-line-19 { background: #6f4f9e; }

.transit-badge {
  display: inline-block;
  margin-right: 4px;
  font-size: 12px;
}

.leaflet-tooltip.metro-tip {
  background: rgba(255, 255, 255, 0.97);
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 5px 8px;
  font-size: 11.5px;
  color: var(--ink);
  box-shadow: 0 2px 8px rgba(0,0,0,0.12);
  line-height: 1.4;
}
.leaflet-tooltip.metro-tip:before { display: none; }
.leaflet-tooltip.metro-tip .tip-en {
  color: var(--ink-soft);
  font-size: 10.5px;
}
.leaflet-tooltip.metro-tip .tip-lines {
  margin-top: 3px;
  display: flex;
  gap: 3px;
}
.leaflet-tooltip.metro-tip .metro-line-pill {
  min-width: 18px;
  height: 16px;
  font-size: 10px;
  padding: 0 5px;
}

.leaflet-popup-content-wrapper.metro-popup,
.metro-popup .leaflet-popup-content-wrapper {
  border-radius: 10px;
}
.station-card {
  font-family: inherit;
  min-width: 160px;
}
.station-card .station-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--ink);
}
.station-card .station-en {
  font-size: 11.5px;
  color: var(--ink-soft);
  margin-top: 1px;
}
.station-card .station-lines {
  margin-top: 8px;
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}
.station-card .station-transfer {
  margin-top: 8px;
  font-size: 11px;
  color: #b8740b;
  background: #fff4d6;
  border: 1px solid #f0d899;
  padding: 3px 7px;
  border-radius: 4px;
  display: inline-block;
}

.popup-flight {
  margin-top: 8px;
  padding: 8px 10px;
  background: #f6f0fa;
  border: 1px solid #ddc6e9;
  border-radius: 6px;
  font-size: 11.5px;
  line-height: 1.55;
  color: var(--ink);
}
.popup-flight .flight-head {
  font-weight: 700;
  font-size: 12px;
  color: #6f3a9b;
  margin-bottom: 4px;
}
.popup-flight .flight-row { margin: 1px 0; }
.popup-flight .flight-key {
  display: inline-block;
  min-width: 44px;
  color: var(--ink-soft);
  margin-right: 6px;
}
.popup-flight .flight-note {
  margin-top: 5px;
  color: var(--ink-soft);
  font-size: 11px;
  font-style: italic;
}

.popup-tickets {
  margin-top: 10px;
  padding-top: 8px;
  border-top: 1px dashed var(--line);
}
.popup-tickets .tickets-head {
  font-size: 11px;
  font-weight: 700;
  color: var(--ink-soft);
  text-transform: uppercase;
  letter-spacing: 0.4px;
  margin-bottom: 6px;
}
.popup-tickets .tickets-links {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.ticket-link {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 5px 10px;
  font-size: 11.5px;
  font-weight: 600;
  text-decoration: none;
  border-radius: 6px;
  border: 1px solid transparent;
  transition: all 0.15s;
}
.ticket-link.meituan {
  background: #fff4d6;
  color: #b8740b;
  border-color: #f0d899;
}
.ticket-link.meituan:hover {
  background: #ffe6a3;
  color: #8a5608;
}
.ticket-link.official {
  background: #e6f0fa;
  color: #2e598a;
  border-color: #c4d8ec;
}
.ticket-link.official:hover {
  background: #d2e2f3;
  color: #1f4470;
}

.origin-dot {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: #2e598a;
  border: 3px solid #fff;
  box-shadow: 0 0 0 2px #2e598a, 0 2px 8px rgba(0,0,0,0.3);
}

.legend {
  position: absolute;
  bottom: 18px;
  right: 18px;
  background: rgba(255, 255, 255, 0.95);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 11.5px;
  line-height: 1.7;
  box-shadow: var(--shadow);
  z-index: 500;
  pointer-events: none;
}
.legend-title {
  font-weight: 700;
  font-size: 11px;
  color: var(--ink-soft);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
}
.legend-row {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--ink);
}
.legend-swatch {
  display: inline-block;
  width: 22px;
  height: 4px;
  border-radius: 2px;
}
.legend-swatch.rail-dim {
  background: repeating-linear-gradient(
    90deg, #9aa0a6 0 5px, transparent 5px 9px
  );
  height: 2px;
}
.legend-swatch.rail-on {
  background: var(--accent);
  height: 4px;
}
.legend-swatch.metro-rainbow {
  background: linear-gradient(
    90deg,
    #00a0e9 0%, #ff6700 16%, #d62c2c 33%,
    #00a350 50%, #9b3a8e 66%, #6cc24a 83%, #b48ed3 100%
  );
  height: 4px;
}
.legend-swatch.origin {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: #2e598a;
  border: 2px solid #fff;
  box-shadow: 0 0 0 1px #2e598a;
}

.leaflet-popup-content-wrapper {
  border-radius: 10px;
  box-shadow: var(--shadow);
}

.marker-pin {
  width: 28px;
  height: 28px;
  border-radius: 50% 50% 50% 0;
  background: var(--accent);
  transform: rotate(-45deg);
  display: flex;
  align-items: center;
  justify-content: center;
  border: 2px solid #fff;
  box-shadow: 0 2px 6px rgba(0,0,0,0.25);
}
.marker-pin span {
  transform: rotate(45deg);
  font-size: 14px;
  line-height: 1;
}
.marker-pin.history { background: var(--history); }
.marker-pin.culture { background: var(--culture); }
.marker-pin.nature  { background: var(--nature); }
.marker-pin.modern  { background: var(--modern); }

@media (max-width: 768px) {
  .layout { flex-direction: column; }
  .sidebar {
    width: 100%;
    height: 45%;
    border-right: none;
    border-bottom: 1px solid var(--line);
    transition: height 0.3s ease;
  }
  .sidebar-head { cursor: pointer; }
  .sidebar-chevron { display: inline-block; }
  .sidebar.collapsed { height: 48px; }
  .sidebar.collapsed .attraction-list,
  .sidebar.collapsed .sidebar-foot { display: none; }
  .map-wrap { flex: 1; }
  .topbar h1 { font-size: 14px; }
  .filter-chips { display: none; }
  .layer-toggle { display: none; }
}
</style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">🐼</span>
      <h1 data-i18n="appName">成都及周边旅游地图</h1>
    </div>
    <div class="controls">
      <div class="filter-chips" id="filterChips"></div>
      <label class="layer-toggle">
        <input type="checkbox" id="metroLayerToggle" checked />
        <span data-i18n="toggleMetroLayer">显示成都地铁</span>
      </label>
      <button id="langToggle" class="lang-btn" title="Switch language">EN</button>
    </div>
  </header>

  <main class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-head" id="sidebarHead">
        <h2 data-i18n="attractionsHeading">景点列表</h2>
        <span class="count" id="count">0</span>
        <span class="sidebar-chevron" aria-hidden="true">▾</span>
      </div>
      <ul class="attraction-list" id="attractionList"></ul>
      <footer class="sidebar-foot">
        <span data-i18n="dataNote">数据仅供参考</span>
        <span>·</span>
        <span>© OpenStreetMap</span>
      </footer>
    </aside>

    <section class="map-wrap">
      <div id="map"></div>
      <div id="legend" class="legend"></div>
    </section>
  </main>

  <script>window.ATTRACTIONS = [{"id":"panda-base","name":{"zh":"成都大熊猫繁育研究基地","en":"Chengdu Research Base of Giant Panda Breeding"},"city":{"zh":"成都市","en":"Chengdu"},"category":"nature","lat":30.7432,"lng":104.1329,"description":{"zh":"世界知名的大熊猫保护与研究机构，可近距离观察大熊猫、小熊猫等珍稀动物。园区内竹林环绕，环境优美，是亲子游和摄影爱好者的首选。","en":"A world-renowned giant panda conservation and research institution where visitors can observe giant pandas, red pandas, and other rare animals up close. Surrounded by bamboo groves, it is a top pick for families and photographers."},"tips":{"zh":"建议清晨入园，熊猫上午最活跃；门票约 55 元。","en":"Arrive early in the morning when pandas are most active. Ticket about CNY 55."},"tickets":{"official":"https://www.panda.org.cn/"},"metro":{"stations":[{"line":"3","name":{"zh":"熊猫大道","en":"Panda Avenue"},"walk":{"zh":"B 口出，换景区免费摆渡车","en":"Exit B, free shuttle to entrance"}}]}},{"id":"wuhou-shrine","name":{"zh":"武侯祠","en":"Wuhou Shrine"},"city":{"zh":"成都市","en":"Chengdu"},"category":"history","lat":30.6453,"lng":104.0478,"description":{"zh":"中国唯一的君臣合祀祠庙，纪念三国时期蜀汉丞相诸葛亮和昭烈帝刘备。建筑古朴，碑刻众多，是了解三国文化的重要场所。","en":"The only shrine in China dedicated to both a ruler and his minister, commemorating Zhuge Liang and Emperor Liu Bei of the Shu Han kingdom. Famous for its ancient architecture and Three Kingdoms heritage."},"tips":{"zh":"可与隔壁的锦里古街连游，门票约 50 元。","en":"Combine with the adjacent Jinli Ancient Street. Ticket about CNY 50."},"metro":{"stations":[{"line":"3 / 5","name":{"zh":"高升桥","en":"Gaoshengqiao"},"walk":{"zh":"约 15 分钟步行（3、5 号线换乘）","en":"~15 min walk (Lines 3 & 5 interchange)"}},{"line":"10","name":{"zh":"武侯祠","en":"Wuhou Shrine"},"walk":{"zh":"出站即到","en":"At the station exit"}}]}},{"id":"jinli-street","name":{"zh":"锦里古街","en":"Jinli Ancient Street"},"city":{"zh":"成都市","en":"Chengdu"},"category":"culture","lat":30.6488,"lng":104.0475,"description":{"zh":"成都最具人气的仿古商业街，毗邻武侯祠。青砖灰瓦，红灯高挂，汇聚川味小吃、手工艺品和茶馆，夜景尤其迷人。","en":"One of Chengdu's most popular ancient-style streets, next to the Wuhou Shrine. Lined with grey-tile shops, red lanterns, Sichuan snacks, handicrafts and teahouses — especially charming after dark."},"tips":{"zh":"免费入场，建议傍晚前往体验夜景。","en":"Free entry. Best visited in the evening for the lantern-lit atmosphere."},"metro":{"stations":[{"line":"10","name":{"zh":"武侯祠","en":"Wuhou Shrine"},"walk":{"zh":"约 5 分钟步行","en":"~5 min walk"}},{"line":"3 / 5","name":{"zh":"高升桥","en":"Gaoshengqiao"},"walk":{"zh":"约 15 分钟步行（3、5 号线换乘）","en":"~15 min walk (Lines 3 & 5 interchange)"}}]}},{"id":"kuanzhai-alley","name":{"zh":"宽窄巷子","en":"Kuanzhai Alley"},"city":{"zh":"成都市","en":"Chengdu"},"category":"culture","lat":30.67,"lng":104.0497,"description":{"zh":"由宽巷子、窄巷子、井巷子三条平行老街组成，是清代古街区的代表，保存了大量四合院与川西民居。集休闲、餐饮、文创于一体。","en":"Three parallel old lanes — Kuan (Wide), Zhai (Narrow), and Jing (Well) — preserving Qing-dynasty courtyards and western-Sichuan-style houses. A blend of leisure, dining, and creative shops."},"tips":{"zh":"免费开放，工作日游客较少，体验更佳。","en":"Free entry. Visit on weekdays for a less crowded experience."},"metro":{"stations":[{"line":"4","name":{"zh":"宽窄巷子","en":"Kuanzhai Alley"},"walk":{"zh":"出站即到","en":"At the station exit"}},{"line":"1 / 4","name":{"zh":"骡马市","en":"Luomashi"},"walk":{"zh":"约 8 分钟步行（1、4 号线换乘）","en":"~8 min walk (Lines 1 & 4 interchange)"}}]}},{"id":"dufu-cottage","name":{"zh":"杜甫草堂","en":"Du Fu Thatched Cottage"},"city":{"zh":"成都市","en":"Chengdu"},"category":"history","lat":30.6628,"lng":104.0269,"description":{"zh":"唐代诗人杜甫流寓成都时的故居，他在此创作了 240 余首诗。园内古木参天，溪流环绕，是中国文学史上的圣地。","en":"The former residence of Tang-dynasty poet Du Fu, where he wrote over 240 poems. Ancient trees, winding streams, and literary heritage make it a pilgrimage site for Chinese literature lovers."},"tips":{"zh":"门票约 50 元，建议预留 2 小时游览。","en":"Ticket about CNY 50. Allow at least 2 hours to fully explore."},"metro":{"stations":[{"line":"4","name":{"zh":"草堂北路","en":"Caotang Beilu"},"walk":{"zh":"约 10 分钟步行","en":"~10 min walk"}}]}},{"id":"qingyang-palace","name":{"zh":"青羊宫","en":"Qingyang Palace"},"city":{"zh":"成都市","en":"Chengdu"},"category":"history","lat":30.6664,"lng":104.0364,"description":{"zh":"西南地区最古老、规模最大的道教宫观之一，相传为老子讲道之处。八卦亭、三清殿等建筑精美，铜羊雕像最为著名。","en":"One of the oldest and largest Taoist temples in southwest China, said to be where Laozi once preached. Famous for the Bagua Pavilion, Sanqing Hall, and the bronze goat sculptures."},"tips":{"zh":"门票约 10 元，可顺便游览旁边的文化公园。","en":"Ticket about CNY 10. Combine with the adjacent Culture Park."},"metro":{"stations":[{"line":"5","name":{"zh":"青羊宫","en":"Qingyang Palace"},"walk":{"zh":"出站即到","en":"At the station exit"}},{"line":"2 / 4 / 5","name":{"zh":"中医大·省医院","en":"TCM University & Provincial Hospital"},"walk":{"zh":"约 5 分钟步行（2、4、5 号线换乘）","en":"~5 min walk (Lines 2, 4 & 5 interchange)"}}]}},{"id":"chunxi-road","name":{"zh":"春熙路 & 太古里","en":"Chunxi Road & Sino-Ocean Taikoo Li"},"city":{"zh":"成都市","en":"Chengdu"},"category":"modern","lat":30.6553,"lng":104.0707,"description":{"zh":"成都最繁华的商圈，融合传统与现代。太古里以低密度开放式街区为特色，毗邻千年古刹大慈寺，是潮流与历史交汇之地。","en":"Chengdu's busiest shopping district, blending tradition and trend. Taikoo Li's low-rise open layout sits next to the millennium-old Daci Temple — fashion meets heritage."},"tips":{"zh":"夜晚灯光更佳，IFS 楼顶的爬墙熊猫是网红打卡点。","en":"Best at night. The climbing panda sculpture on top of IFS is a famous photo spot."},"metro":{"stations":[{"line":"2 / 3","name":{"zh":"春熙路","en":"Chunxi Road"},"walk":{"zh":"出站即到（2、3 号线换乘站）","en":"At the station exit (Lines 2 & 3 interchange)"}}]}},{"id":"jinsha-site","name":{"zh":"金沙遗址博物馆","en":"Jinsha Site Museum"},"city":{"zh":"成都市","en":"Chengdu"},"category":"history","lat":30.681,"lng":104.0145,"description":{"zh":"古蜀文明重要遗址，距今约 3000 年。出土了大量金器、玉器，最著名的『太阳神鸟』金饰已成为中国文化遗产标志。","en":"A major archaeological site of the ancient Shu civilization, around 3,000 years old. Famous for the gold 'Sun and Immortal Birds' artifact, now a national cultural heritage emblem."},"tips":{"zh":"门票约 70 元，包含遗迹馆和陈列馆。","en":"Ticket about CNY 70, covering both the relic hall and exhibition hall."},"metro":{"stations":[{"line":"7","name":{"zh":"金沙博物馆","en":"Jinsha Museum"},"walk":{"zh":"出站即到","en":"At the station exit"}},{"line":"4 / 7","name":{"zh":"文化宫","en":"Cultural Palace"},"walk":{"zh":"约 12 分钟步行（4、7 号线换乘）","en":"~12 min walk (Lines 4 & 7 interchange)"}}]}},{"id":"sanxingdui","name":{"zh":"三星堆博物馆","en":"Sanxingdui Museum"},"city":{"zh":"广汉市","en":"Guanghan"},"category":"history","lat":31.0037,"lng":104.2166,"description":{"zh":"距成都约 40 公里，展示距今 3000–5000 年的古蜀文明。青铜大立人、青铜面具、神树等出土文物震惊世界，被誉为『长江文明之源』。","en":"About 40 km from Chengdu, showcasing the 3,000–5,000-year-old ancient Shu civilization. The bronze standing figure, masks, and sacred tree have astonished the world."},"tips":{"zh":"新馆 2023 年开放，门票约 72 元，建议预约。","en":"The new exhibition hall opened in 2023. Ticket about CNY 72; reservation recommended."},"rail":{"line":{"zh":"成绵乐城际","en":"Chengdu–Mianyang–Leshan Intercity"},"from":{"zh":"成都东站","en":"Chengdu East"},"to":{"zh":"广汉北站","en":"Guanghan North"},"duration":{"zh":"约 25 分钟","en":"~25 min"},"waypoints":[[30.6309,104.1417],[30.82,104.18],[30.9986,104.1969]]},"tickets":{"official":"https://www.sxd.cn/"}},{"id":"dujiangyan","name":{"zh":"都江堰","en":"Dujiangyan Irrigation System"},"city":{"zh":"都江堰市","en":"Dujiangyan"},"category":"history","lat":31.0017,"lng":103.6058,"description":{"zh":"建于公元前 256 年，是世界上现存最古老、仍在使用的无坝引水工程。由秦国蜀郡太守李冰主持修建，被列入世界文化遗产。","en":"Built in 256 BC, the world's oldest still-functioning dam-free irrigation system. Designed by Li Bing of the Qin state and listed as a UNESCO World Heritage Site."},"tips":{"zh":"门票约 80 元，可与青城山联票游览。","en":"Ticket about CNY 80. Combo tickets available with Qingcheng Mountain."},"rail":{"line":{"zh":"成灌铁路","en":"Chengdu–Dujiangyan Intercity"},"from":{"zh":"成都站","en":"Chengdu Station"},"to":{"zh":"都江堰站","en":"Dujiangyan Station"},"duration":{"zh":"约 35 分钟","en":"~35 min"},"waypoints":[[30.6973,104.0721],[30.78,103.93],[31.0017,103.6058]]}},{"id":"qingcheng-mountain","name":{"zh":"青城山","en":"Mount Qingcheng"},"city":{"zh":"都江堰市","en":"Dujiangyan"},"category":"nature","lat":30.9038,"lng":103.5697,"description":{"zh":"中国道教发源地之一，以幽静著称，素有『青城天下幽』之美誉。分前山（人文）和后山（自然），世界文化遗产。","en":"One of the birthplaces of Taoism, renowned for its tranquility — 'Qingcheng, the most secluded under heaven'. Divided into front (cultural) and back (natural) mountain. UNESCO World Heritage."},"tips":{"zh":"前山门票约 80 元，后山约 20 元；徒步需 3-5 小时。","en":"Front mountain ticket about CNY 80, back mountain CNY 20. Allow 3-5 hours for hiking."},"rail":{"line":{"zh":"成灌铁路青城山支线","en":"Qingchengshan Branch Line"},"from":{"zh":"成都站","en":"Chengdu Station"},"to":{"zh":"青城山站","en":"Qingchengshan Station"},"duration":{"zh":"约 40 分钟","en":"~40 min"},"waypoints":[[30.6973,104.0721],[30.78,103.85],[30.9038,103.5697]]}},{"id":"xiling-snow-mountain","name":{"zh":"西岭雪山","en":"Xiling Snow Mountain"},"city":{"zh":"大邑县","en":"Dayi"},"category":"nature","lat":30.7831,"lng":103.1947,"description":{"zh":"杜甫『窗含西岭千秋雪』的西岭即此。最高峰大雪塘海拔 5364 米，是成都周边最佳滑雪与观雪场所，夏季亦凉爽宜人。","en":"The Xiling immortalized in Du Fu's poetry. Its highest peak Daxuetang reaches 5,364 m. The premier ski and snow-viewing destination near Chengdu, also a cool summer retreat."},"tips":{"zh":"冬季滑雪门票约 120 元，索道另算；夏季可避暑徒步。","en":"Winter skiing ticket about CNY 120, cable car extra. A cool hiking spot in summer."}},{"id":"huanglongxi","name":{"zh":"黄龙溪古镇","en":"Huanglongxi Ancient Town"},"city":{"zh":"双流区","en":"Shuangliu"},"category":"culture","lat":30.3176,"lng":103.969,"description":{"zh":"距成都约 40 公里，已有 1700 多年历史。三县衙门、千年古榕、青石板街道保存完好，夏季戏水街尤受欢迎。","en":"About 40 km from Chengdu, with over 1,700 years of history. Well-preserved courthouses, ancient banyan trees, and stone-paved streets. The 'water street' is especially popular in summer."},"tips":{"zh":"免费开放，建议夏季游玩戏水街。","en":"Free entry. Best in summer for the water street."}},{"id":"leshan-buddha","name":{"zh":"乐山大佛","en":"Leshan Giant Buddha"},"city":{"zh":"乐山市","en":"Leshan"},"category":"history","lat":29.5447,"lng":103.7706,"description":{"zh":"世界最大的石刻坐佛，高 71 米，开凿于唐代。位于岷江、青衣江、大渡河三江交汇处，世界文化与自然双遗产。","en":"The world's tallest stone-carved seated Buddha at 71 m, carved during the Tang dynasty. At the confluence of three rivers, a UNESCO Cultural and Natural Heritage Site."},"tips":{"zh":"门票约 80 元，可搭船远观或登栈道近看，距成都高铁约 1 小时。","en":"Ticket about CNY 80. View by boat or via the cliffside walkway. About 1 hour from Chengdu by high-speed rail."},"rail":{"line":{"zh":"成贵高铁","en":"Chengdu–Guiyang HSR"},"from":{"zh":"成都东站","en":"Chengdu East"},"to":{"zh":"乐山站","en":"Leshan Station"},"duration":{"zh":"约 1 小时","en":"~1 hour"},"waypoints":[[30.6309,104.1417],[30.2,103.95],[29.5447,103.7706]]}},{"id":"emei-mountain","name":{"zh":"峨眉山","en":"Mount Emei"},"city":{"zh":"峨眉山市","en":"Emeishan"},"category":"nature","lat":29.5208,"lng":103.3331,"description":{"zh":"中国佛教四大名山之一，主峰金顶海拔 3079 米。云海、日出、佛光、圣灯四大奇观闻名，与乐山大佛同列世界双遗产。","en":"One of China's four sacred Buddhist mountains, with Jinding peak at 3,079 m. Famous for cloud seas, sunrises, Buddha's halo, and 'sacred lamps'. UNESCO double heritage site with Leshan Buddha."},"tips":{"zh":"门票约 160 元，建议至少安排两天，金顶看日出。","en":"Ticket about CNY 160. Plan at least two days; sunrise at Jinding is a must."},"rail":{"line":{"zh":"成贵高铁","en":"Chengdu–Guiyang HSR"},"from":{"zh":"成都东站","en":"Chengdu East"},"to":{"zh":"峨眉山站","en":"Emeishan Station"},"duration":{"zh":"约 1.5 小时","en":"~1.5 hours"},"waypoints":[[30.6309,104.1417],[30.2,103.95],[29.5447,103.7706],[29.5208,103.3331]]},"tickets":{"official":"https://www.ems517.com/"}},{"id":"jiuzhaigou","name":{"zh":"九寨沟","en":"Jiuzhaigou Valley"},"city":{"zh":"阿坝州","en":"Aba Prefecture"},"category":"nature","lat":33.3072,"lng":103.9326,"description":{"zh":"以翠海、叠瀑、彩林、雪峰、藏情『五绝』闻名世界，被誉为『童话世界』。世界自然遗产，水景色彩之绝堪称中国第一。","en":"World-famous for its 'five wonders': turquoise lakes, layered waterfalls, colorful forests, snowy peaks, and Tibetan culture. Often called a 'fairyland on earth'. UNESCO Natural Heritage."},"tips":{"zh":"距成都约 400 公里，建议自驾或飞九黄机场；秋季最美。","en":"About 400 km from Chengdu. Drive or fly to Jiuzhai Huanglong Airport. Autumn is the best season."},"rail":{"line":{"zh":"川青铁路","en":"Sichuan–Qinghai Railway"},"from":{"zh":"成都东站","en":"Chengdu East"},"to":{"zh":"黄龙九寨站","en":"Huanglong-Jiuzhai Station"},"duration":{"zh":"约 2 小时（站到景区还需大巴 1.5h）","en":"~2h + 1.5h shuttle to scenic area"},"waypoints":[[30.6309,104.1417],[31.45,104.1],[32.4,104.2],[32.85,103.95],[33.2604,103.9195]]},"tickets":{"official":"https://www.jiuzhai.com/"},"flight":{"airport":{"zh":"九寨黄龙机场 (JZH)","en":"Jiuzhai Huanglong Airport (JZH)"},"from":{"zh":"成都双流/天府机场","en":"Chengdu Shuangliu / Tianfu"},"duration":{"zh":"约 45 分钟","en":"~45 min"},"note":{"zh":"到机场后约 1.5h 车程至景区","en":"~1.5h transfer from the airport to the scenic area"}}},{"id":"huanglong","name":{"zh":"黄龙风景区","en":"Huanglong Scenic Area"},"city":{"zh":"阿坝州","en":"Aba Prefecture"},"category":"nature","lat":32.7547,"lng":103.8244,"description":{"zh":"以钙华彩池闻名，3000 多个池子如金龙鳞甲铺陈山间，海拔 3145–3578 米。世界自然遗产，常与九寨沟联游。","en":"Famed for over 3,000 travertine pools cascading like a golden dragon's scales, at 3,145–3,578 m elevation. UNESCO Natural Heritage, often combined with Jiuzhaigou."},"tips":{"zh":"海拔较高，注意预防高原反应；门票约 170 元。","en":"High altitude — beware of altitude sickness. Ticket about CNY 170."},"rail":{"line":{"zh":"川青铁路","en":"Sichuan–Qinghai Railway"},"from":{"zh":"成都东站","en":"Chengdu East"},"to":{"zh":"黄龙九寨站","en":"Huanglong-Jiuzhai Station"},"duration":{"zh":"约 2 小时（站到景区还需大巴 1h）","en":"~2h + 1h shuttle to scenic area"},"waypoints":[[30.6309,104.1417],[31.45,104.1],[32.4,104.2],[32.7547,103.8244]]},"flight":{"airport":{"zh":"九寨黄龙机场 (JZH)","en":"Jiuzhai Huanglong Airport (JZH)"},"from":{"zh":"成都双流/天府机场","en":"Chengdu Shuangliu / Tianfu"},"duration":{"zh":"约 45 分钟","en":"~45 min"},"note":{"zh":"机场距黄龙景区约 1h 车程，海拔较高需注意","en":"~1h transfer from the airport. Be mindful of high altitude."}}},{"id":"daocheng-yading","name":{"zh":"稻城亚丁","en":"Daocheng Yading"},"city":{"zh":"甘孜州","en":"Garze Prefecture"},"category":"nature","lat":28.5069,"lng":100.2649,"description":{"zh":"被誉为『水蓝色星球上最后一片净土』。三座神山仙乃日、央迈勇、夏诺多吉环抱牛奶海、五色海，藏地圣境。","en":"Hailed as 'the last Shangri-La on the blue planet'. Three sacred peaks — Chenrezig, Jampelyang, and Chanadorje — encircle the Milk Lake and Five-Color Lake."},"tips":{"zh":"海拔 4000+ 米，必须做好高原准备；最佳季节 9-10 月。","en":"Elevation over 4,000 m — altitude preparation essential. Best in September–October."},"flight":{"airport":{"zh":"稻城亚丁机场 (DCY)","en":"Daocheng Yading Airport (DCY)"},"from":{"zh":"成都双流/天府机场","en":"Chengdu Shuangliu / Tianfu"},"duration":{"zh":"约 65 分钟","en":"~65 min"},"note":{"zh":"世界最高民用机场（海拔 4411 m），到机场后还需 1.5h 车程到亚丁景区","en":"World's highest civil airport (4,411 m). ~1.5h transfer to the scenic area"}}},{"id":"siguniang-mountain","name":{"zh":"四姑娘山","en":"Mount Siguniang"},"city":{"zh":"阿坝州","en":"Aba Prefecture"},"category":"nature","lat":30.9956,"lng":102.8309,"description":{"zh":"由四座相连的山峰组成，主峰幺妹峰海拔 6250 米，被誉为『东方阿尔卑斯』。徒步、登山、摄影爱好者的天堂。","en":"Four connected peaks with the highest, Yaomei, at 6,250 m — known as the 'Oriental Alps'. A paradise for hikers, climbers, and photographers."},"tips":{"zh":"距成都约 220 公里，长坪沟、双桥沟最适合一日游。","en":"About 220 km from Chengdu. Changping and Shuangqiao valleys are best for day trips."}},{"id":"langzhong-ancient-city","name":{"zh":"阆中古城","en":"Langzhong Ancient City"},"city":{"zh":"南充市","en":"Nanchong"},"category":"culture","lat":31.5589,"lng":105.9756,"description":{"zh":"中国四大古城之一，已有 2300 多年历史。三面环水四面环山，唐宋格局保存完好，是春节文化的重要发源地。","en":"One of China's four great ancient cities, with over 2,300 years of history. Surrounded by water on three sides and mountains on four, with Tang–Song layouts intact. A cradle of Spring Festival culture."},"tips":{"zh":"联票约 110 元，建议住一晚体验夜景。","en":"Combo ticket about CNY 110. Stay overnight to enjoy the night views."},"rail":{"line":{"zh":"兰渝铁路","en":"Lanzhou–Chongqing Railway"},"from":{"zh":"成都东站","en":"Chengdu East"},"to":{"zh":"阆中站","en":"Langzhong Station"},"duration":{"zh":"约 3 小时","en":"~3 hours"},"waypoints":[[30.6309,104.1417],[30.85,104.65],[31.2,105.4],[31.5589,105.9756]]}},{"id":"renmin-park","name":{"zh":"人民公园 & 鹤鸣茶社","en":"People's Park & Heming Teahouse"},"city":{"zh":"成都市","en":"Chengdu"},"category":"culture","lat":30.6649,"lng":104.0631,"description":{"zh":"成都人最爱的市民公园，百年鹤鸣茶社坐落其中。竹椅、盖碗茶、采耳、麻将——最地道的『成都慢生活』就在这里。","en":"Chengdu locals' favorite park, home to the century-old Heming Teahouse. Bamboo chairs, gaiwan tea, ear-cleaning, and mahjong — the most authentic taste of Chengdu's slow life."},"tips":{"zh":"免费入园，盖碗茶约 20-30 元/位，周末人多但氛围好。","en":"Free entry. Tea about CNY 20-30 per cup. Weekends are crowded but lively."},"metro":{"stations":[{"line":"2 / 17","name":{"zh":"人民公园","en":"People's Park"},"walk":{"zh":"出站即到（2、17 号线换乘）","en":"At the station exit (Lines 2 & 17 interchange)"}},{"line":"1 / 4","name":{"zh":"骡马市","en":"Luomashi"},"walk":{"zh":"约 7 分钟步行（1、4 号线换乘）","en":"~7 min walk (Lines 1 & 4 interchange)"}},{"line":"1 / 2","name":{"zh":"天府广场","en":"Tianfu Square"},"walk":{"zh":"约 8 分钟步行（1、2 号线换乘）","en":"~8 min walk (Lines 1 & 2 interchange)"}}]}},{"id":"dongjiao-memory","name":{"zh":"东郊记忆","en":"Eastern Suburb Memory"},"city":{"zh":"成都市","en":"Chengdu"},"category":"modern","lat":30.6708,"lng":104.1263,"description":{"zh":"由原国营红光电子管厂改造的工业风文创园区，保留了大量老厂房和铁轨。汇聚音乐 Live House、潮流店铺、咖啡馆和艺术展，是年轻人和摄影爱好者的热门打卡地。","en":"An industrial-style creative park converted from the former Hongguang Electronics Factory, with old workshops and rail tracks preserved. Filled with live houses, trendy shops, cafés, and art exhibitions — a hotspot for young people and photographers."},"tips":{"zh":"免费开放，傍晚到夜晚最有氛围。","en":"Free entry. Best from dusk to night."},"metro":{"stations":[{"line":"8","name":{"zh":"东郊记忆","en":"Eastern Suburb Memory"},"walk":{"zh":"出站即到","en":"At the station exit"}}]}},{"id":"yulin-road","name":{"zh":"玉林路 & 小酒馆","en":"Yulin Road & Little Bar"},"city":{"zh":"成都市","en":"Chengdu"},"category":"modern","lat":30.632,"lng":104.0538,"description":{"zh":"因赵雷《成都》一曲走红的街区，藏着成都最市井的烟火气与最有腔调的小酒馆。深夜的串串、苍蝇馆子、独立 Live House 是这里的灵魂。","en":"The neighborhood made famous by Zhao Lei's song 'Chengdu'. Behind its everyday street life lie hip bars, late-night skewer joints, hole-in-the-wall eateries, and indie live houses."},"tips":{"zh":"建议晚饭后步行游玩，小酒馆需提前订位看演出。","en":"Best explored after dinner on foot. Reserve in advance to catch a Little Bar live show."},"metro":{"stations":[{"line":"3","name":{"zh":"磨子桥","en":"Mozi Bridge"},"walk":{"zh":"约 8 分钟步行","en":"~8 min walk"}},{"line":"1 / 3","name":{"zh":"省体育馆","en":"Provincial Stadium"},"walk":{"zh":"约 12 分钟步行（1、3 号线换乘）","en":"~12 min walk (Lines 1 & 3 interchange)"}}]}},{"id":"hailuogou","name":{"zh":"海螺沟","en":"Hailuogou Glacier Park"},"city":{"zh":"甘孜州","en":"Garze Prefecture"},"category":"nature","lat":29.621,"lng":102.1099,"description":{"zh":"贡嘎雪山东坡的低海拔现代冰川，最低处仅 2850 米，是中国最容易抵达的冰川之一。泡温泉、看日照金山（贡嘎主峰 7556 米）是经典体验。","en":"A low-altitude modern glacier on the eastern slope of Mount Gongga, descending to just 2,850 m — one of the most accessible glaciers in China. Hot springs and the golden sunrise on the 7,556 m Gongga peak are highlights."},"tips":{"zh":"距成都约 320 公里，海拔比稻城亚丁低，更易适应。","en":"About 320 km from Chengdu. Lower altitude than Daocheng Yading, easier to acclimatize."},"flight":{"airport":{"zh":"康定机场 (KGT)","en":"Kangding Airport (KGT)"},"from":{"zh":"成都双流机场","en":"Chengdu Shuangliu"},"duration":{"zh":"约 50 分钟","en":"~50 min"},"note":{"zh":"到机场后约 3h 车程至海螺沟景区","en":"~3h transfer from the airport to the scenic area"}}},{"id":"anren-jianchuan","name":{"zh":"安仁古镇 & 建川博物馆","en":"Anren Town & Jianchuan Museum Cluster"},"city":{"zh":"大邑县","en":"Dayi"},"category":"history","lat":30.5547,"lng":103.5439,"description":{"zh":"中国唯一的『博物馆小镇』，27 座主题博物馆聚落涵盖抗战、红色年代、地震、民俗等。结合民国公馆群与刘氏庄园，是深度文化游的宝藏地。","en":"China's only 'Museum Town', with 27 themed museums covering WWII, the Red era, earthquakes, and folk life. Combined with Republic-era mansions and the Liu Family Estate, it's a hidden gem for cultural travelers."},"tips":{"zh":"距成都约 60 公里，建议预留一整天；建川博物馆联票约 100 元。","en":"About 60 km from Chengdu — allow a full day. Jianchuan combo ticket about CNY 100."}}];

  <script>(function () {
  'use strict';

  // Injected by build.py
  const attractions = window.ATTRACTIONS || [];
  const metroLines = window.METRO_LINES || [];
  const metroStations = window.METRO_STATIONS || [];

  const i18n = {

      dataNote: 'Info for reference only',
      tipsLabel: 'Tip',
      categoryAll: 'All',
      categoryHistory: 'History',
      categoryCulture: 'Culture',
      categoryNature: 'Nature',
      categoryModern: 'Modern',
      langButton: '中文',
      railHeading: 'High-speed Rail',

      railNoteApprox: 'Route is illustrative, not the actual track',
      railNoneAvailable: 'No direct HSR — drive or take a long-distance bus',
      legendTitle: 'Legend',
      legendRailDimmed: 'HSR routes',
      legendRailActive: 'Selected route',
      legendChengdu: 'Chengdu (origin)',
      ticketsHeading: 'Tickets',
      ticketsMeituan: 'Meituan search',
      ticketsOfficial: 'Official site',
      ticketsExternalNote: 'Opens external site',
      metroHeading: 'Metro',
      metroLine: 'Line',
      metroStation: 'Station',
      metroWalk: 'Walk',
      flightHeading: 'Flight',
      flightAirport: 'Airport',
      flightFrom: 'From',
      flightDuration: 'Duration',
      toggleMetroLayer: 'Show Chengdu Metro',
      legendMetroLayer: 'Metro lines'
    }
  };

  const state = {
    lang: 'zh',
    activeId: null,
    activeCategory: 'all'
  };

  const categoryEmoji = {
    history: '🏛',
    culture: '🏮',
    nature: '⛰',
    modern: '🌆'
  };

  // Chengdu origin (Chengdu East railway station)
  const CHENGDU_ORIGIN = [30.6309, 104.1417];

  // ---------- Map ----------
  const map = L.map('map', {
    zoomControl: true,
    attributionControl: true
  }).setView([30.67, 104.07], 8);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    maxZoom: 19,
    subdomains: 'abcd',
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> © <a href="https://carto.com/attributions">CARTO</a>'
  }).addTo(map);

  // ---------- Metro layer ----------
  const metroLinesGroup = L.layerGroup();
  const metroStationsGroup = L.layerGroup();
  const metroLayer = L.layerGroup([metroLinesGroup, metroStationsGroup]);
  const metroLineLayers = {}; // ref -> { polylines, color }

  metroLines.forEach(function (ml) {
    const segs = (ml.segments && ml.segments.length) ? ml.segments :
                 (ml.coords ? [ml.coords] : []);
    const polylines = segs.map(function (seg) {
      return L.polyline(seg, {
        color: ml.color || '#888',
        weight: 3,
        opacity: 0.75,
        lineCap: 'round',
        lineJoin: 'round'
      }).addTo(metroLinesGroup);
    });
    metroLineLayers[ml.ref] = { polylines: polylines, color: ml.color || '#888' };
  });

  metroStations.forEach(function (s) {
    const isTransfer = s.lines.length >= 2;
    const primaryColor = s.lines[0] ? s.lines[0].color : '#888';
    const dot = L.circleMarker([s.lat, s.lng], {
      radius: isTransfer ? 5 : 3.2,
      fillColor: '#ffffff',
      color: isTransfer ? '#222' : primaryColor,
      weight: isTransfer ? 2 : 1.5,
      opacity: 1,
      fillOpacity: 1
    });
    dot.bindTooltip(buildStationTooltip(s),
      { direction: 'top', offset: [0, -4], className: 'metro-tip' });
    dot.bindPopup(buildStationPopup(s), { maxWidth: 260, className: 'metro-popup' });
    dot.addTo(metroStationsGroup);
  });

  // Default ON
  metroLayer.addTo(map);

  function buildStationTooltip(s) {
    const pills = s.lines.map(function (l) {
      return '<span class="metro-line-pill metro-line-' + cssLine(l.ref) +
             '" style="background:' + l.color + '">' + l.ref + '</span>';
    }).join('');
    return '<b>' + escapeHtml(s.name_zh) + '</b>' +
           (s.name_en ? '<span class="tip-en"> · ' + escapeHtml(s.name_en) + '</span>' : '') +
           '<div class="tip-lines">' + pills + '</div>';
  }

  function buildStationPopup(s) {
    const pills = s.lines.map(function (l) {
      return '<span class="metro-line-pill metro-line-' + cssLine(l.ref) +
             '" style="background:' + l.color + '">' + l.ref + '</span>';
    }).join(' ');
    return (
      '<div class="station-card">' +
        '<div class="station-name">' + escapeHtml(s.name_zh) + '</div>' +
        (s.name_en ? '<div class="station-en">' + escapeHtml(s.name_en) + '</div>' : '') +
        '<div class="station-lines">' + pills + '</div>' +
        (s.lines.length >= 2
          ? '<div class="station-transfer">🔄 ' +
            (state.lang === 'zh' ? '换乘车站' : 'Transfer station') + '</div>'
          : '') +
      '</div>'
    );
  }

  function setMetroLineHighlight(refs) {
    const set = new Set((refs || []).map(String));
    Object.keys(metroLineLayers).forEach(function (ref) {
      const layer = metroLineLayers[ref];
      const active = set.has(ref);
      layer.polylines.forEach(function (pl) {
        pl.setStyle({
          weight: active ? 5 : 3,
          opacity: set.size === 0 ? 0.75 : (active ? 1 : 0.2)
        });
        if (active) pl.bringToFront();
      });
    });
  }

  // ---------- Rail polylines ----------
  const railsById = {};

  function railPath(a) {
    if (!a.rail) return null;
    const wps = a.rail.waypoints && a.rail.waypoints.length
      ? a.rail.waypoints.slice()
      : [CHENGDU_ORIGIN, [a.lat, a.lng]];
    // ensure path starts at Chengdu and ends at attraction
    if (!sameLatLng(wps[0], CHENGDU_ORIGIN)) wps.unshift(CHENGDU_ORIGIN);
    if (!sameLatLng(wps[wps.length - 1], [a.lat, a.lng])) wps.push([a.lat, a.lng]);
    return wps;
  }
  function sameLatLng(p, q) {
    return Math.abs(p[0] - q[0]) < 1e-6 && Math.abs(p[1] - q[1]) < 1e-6;
  }

  attractions.forEach(function (a) {
    const path = railPath(a);
    if (!path) return;
    // dimmed base line
    const base = L.polyline(path, {
      color: '#9aa0a6',
      weight: 2,
      opacity: 0.55,
      dashArray: '6 6',
      className: 'rail-line rail-base'
    }).addTo(map);
    // highlight overlay (hidden by default)
    const highlight = L.polyline(path, {
      color: '#c8463c',
      weight: 5,
      opacity: 0.95,
      className: 'rail-line rail-highlight'
    });
    railsById[a.id] = { base: base, highlight: highlight };
  });

  // Chengdu origin marker
  L.marker(CHENGDU_ORIGIN, {
    icon: L.divIcon({
      className: 'origin-marker',
      html: '<div class="origin-dot" title="成都东站 / Chengdu East"></div>',
      iconSize: [18, 18],
      iconAnchor: [9, 9]
    }),
    interactive: false,
    keyboard: false
  }).addTo(map);

  // ---------- Attraction markers ----------
  const markersById = {};

  attractions.forEach(function (a) {
    const icon = L.divIcon({
      className: 'custom-marker',
      html: '<div class="marker-pin ' + a.category + '"><span>' +
            (categoryEmoji[a.category] || '📍') + '</span></div>',
      iconSize: [28, 28],
      iconAnchor: [14, 28],
      popupAnchor: [0, -28]
    });
    const marker = L.marker([a.lat, a.lng], { icon: icon }).addTo(map);
    marker.bindPopup(buildPopup(a), { maxWidth: 320 });
    marker.on('click', function () { setActive(a.id, false); });
    markersById[a.id] = marker;
  });

  // ---------- Sidebar ----------
  const listEl = document.getElementById('attractionList');
  const countEl = document.getElementById('count');

  function renderList() {
    listEl.innerHTML = '';
    const filtered = attractions.filter(function (a) {
      return state.activeCategory === 'all' || a.category === state.activeCategory;
    });
    countEl.textContent = filtered.length;
    filtered.forEach(function (a) {
      const li = document.createElement('li');
      li.className = 'attraction-item' + (a.id === state.activeId ? ' active' : '');
      li.dataset.id = a.id;
      const badges = [];
      if (a.metro) badges.push('<span class="transit-badge metro" title="Metro">🚇</span>');
      if (a.rail) badges.push('<span class="transit-badge rail" title="HSR">🚄</span>');
      if (a.flight) badges.push('<span class="transit-badge flight" title="Flight">✈️</span>');
      const transitBadge = badges.join('');
      li.innerHTML =
        '<div class="item-row">' +
          '<div class="item-name">' + transitBadge + escapeHtml(a.name[state.lang]) + '</div>' +
          '<div class="item-city">' + escapeHtml(a.city[state.lang]) + '</div>' +
        '</div>' +
        '<span class="item-tag ' + a.category + '">' +
          escapeHtml(i18n[state.lang]['category' + cap(a.category)] || a.category) +
        '</span>';
      li.addEventListener('click', function () { setActive(a.id, true); });
      listEl.appendChild(li);
    });
  }

  function setActive(id, flyTo) {
    state.activeId = id;
    const a = attractions.find(function (x) { return x.id === id; });
    if (!a) return;
    document.querySelectorAll('.attraction-item').forEach(function (el) {
      el.classList.toggle('active', el.dataset.id === id);
    });
    // highlight rail
    Object.keys(railsById).forEach(function (rid) {
      const r = railsById[rid];
      if (rid === id) {
        if (!map.hasLayer(r.highlight)) r.highlight.addTo(map);
        r.highlight.bringToFront();
      } else {
        if (map.hasLayer(r.highlight)) map.removeLayer(r.highlight);
      }
    });
    // highlight metro lines for the selected attraction
    if (a.metro && a.metro.stations) {
      const refs = [];
      a.metro.stations.forEach(function (s) {
        String(s.line).split(/\s*\/\s*/).forEach(function (n) {
          if (n) refs.push(n);
        });
      });
      setMetroLineHighlight(refs);
    } else {
      setMetroLineHighlight([]);
    }
    if (flyTo) {
      // Zoom in by category: city attractions get tight zoom, distant ones less
      const zoom = a.metro ? 15 : (a.flight ? 10 : 12);
      map.flyTo([a.lat, a.lng], zoom, { duration: 0.8 });
    }
    const marker = markersById[id];
    if (marker) marker.openPopup();
    const el = listEl.querySelector('[data-id="' + id + '"]');
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  // Click empty map to clear highlight
  map.on('click', function () {
    state.activeId = null;
    document.querySelectorAll('.attraction-item.active').forEach(function (el) {
      el.classList.remove('active');
    });
    Object.keys(railsById).forEach(function (rid) {
      const r = railsById[rid];
      if (map.hasLayer(r.highlight)) map.removeLayer(r.highlight);
    });
    setMetroLineHighlight([]);
  });

  // ---------- Filter chips ----------
  const filterChipsEl = document.getElementById('filterChips');
  const categories = ['all', 'history', 'culture', 'nature', 'modern'];

  function renderChips() {
    filterChipsEl.innerHTML = '';
    categories.forEach(function (c) {
      const chip = document.createElement('span');
      chip.className = 'chip' + (state.activeCategory === c ? ' active' : '');
      chip.textContent = i18n[state.lang]['category' + cap(c)] || c;
      chip.addEventListener('click', function () {
        state.activeCategory = c;
        renderChips();
        renderList();
        refreshMarkerVisibility();
      });
      filterChipsEl.appendChild(chip);
    });
  }

  function refreshMarkerVisibility() {
    attractions.forEach(function (a) {
      const m = markersById[a.id];
      if (!m) return;
      const visible = state.activeCategory === 'all' || a.category === state.activeCategory;
      if (visible) {
        if (!map.hasLayer(m)) m.addTo(map);
      } else {
        if (map.hasLayer(m)) map.removeLayer(m);
      }
      // also hide/show base rail line with the marker
      const r = railsById[a.id];
      if (r) {
        if (visible) {
          if (!map.hasLayer(r.base)) r.base.addTo(map);
        } else {
          if (map.hasLayer(r.base)) map.removeLayer(r.base);
          if (map.hasLayer(r.highlight)) map.removeLayer(r.highlight);
        }
      }
    });
  }

  // ---------- Sidebar collapse (mobile) ----------
  const sidebarEl = document.getElementById('sidebar');
  const sidebarHeadEl = document.getElementById('sidebarHead');
  if (sidebarHeadEl) {
    sidebarHeadEl.addEventListener('click', function () {
      sidebarEl.classList.toggle('collapsed');
      // Trigger Leaflet to recompute its viewport so the map redraws fully
      setTimeout(function () { map.invalidateSize(); }, 320);
    });
  }

  // ---------- Metro layer toggle ----------
  const metroToggleEl = document.getElementById('metroLayerToggle');
  if (metroToggleEl) {
    metroToggleEl.addEventListener('change', function () {
      if (metroToggleEl.checked) {
        if (!map.hasLayer(metroLayer)) metroLayer.addTo(map);
      } else {
        if (map.hasLayer(metroLayer)) map.removeLayer(metroLayer);
      }
    });
  }

  // ---------- Language ----------
  const langBtn = document.getElementById('langToggle');
  langBtn.addEventListener('click', function () {
    state.lang = state.lang === 'zh' ? 'en' : 'zh';
    applyLanguage();
  });

  function applyLanguage() {
    document.documentElement.lang = state.lang === 'zh' ? 'zh-CN' : 'en';
    document.querySelectorAll('[data-i18n]').forEach(function (el) {
      const key = el.getAttribute('data-i18n');
      const v = i18n[state.lang][key];
      if (v != null) {
        if (el.tagName === 'TITLE') {
          document.title = v;
        } else {
          el.textContent = v;
        }
      }
    });
    langBtn.textContent = i18n[state.lang].langButton;
    renderChips();
    renderList();
    renderLegend();
    attractions.forEach(function (a) {
      const m = markersById[a.id];
      if (!m) return;
      m.setPopupContent(buildPopup(a));
    });
  }

  // ---------- Legend ----------
  const legendEl = document.getElementById('legend');
  function renderLegend() {
    if (!legendEl) return;
    const t = i18n[state.lang];
    legendEl.innerHTML =
      '<div class="legend-title">' + t.legendTitle + '</div>' +
      '<div class="legend-row"><span class="legend-swatch origin"></span>' + t.legendChengdu + '</div>' +
      '<div class="legend-row"><span class="legend-swatch rail-dim"></span>' + t.legendRailDimmed + '</div>' +
      '<div class="legend-row"><span class="legend-swatch rail-on"></span>' + t.legendRailActive + '</div>' +
      '<div class="legend-row"><span class="legend-swatch metro-rainbow"></span>' + t.legendMetroLayer + '</div>';
  }

  // ---------- Popup ----------
  function buildPopup(a) {
    const t = i18n[state.lang];
    let html =
      '<div class="popup-card">' +
        '<h3>' + escapeHtml(a.name[state.lang]) + '</h3>' +
        '<div class="popup-city">📍 ' + escapeHtml(a.city[state.lang]) + '</div>' +
        '<p>' + escapeHtml(a.description[state.lang]) + '</p>';
    if (a.tips && a.tips[state.lang]) {
      html += '<div class="popup-tips"><b>' + t.tipsLabel + ':</b> ' +
              escapeHtml(a.tips[state.lang]) + '</div>';
    }
    if (a.metro) {
      html += buildMetro(a, t);
    } else {
      if (a.rail) {
        const r = a.rail;
        html +=
          '<div class="popup-rail">' +
            '<div class="rail-head">🚄 ' + t.railHeading + '</div>' +
            '<div class="rail-row"><span class="rail-key">' + t.railLine + '</span>' +
              escapeHtml(r.line[state.lang]) + '</div>' +
            '<div class="rail-row"><span class="rail-key">' + t.railStations + '</span>' +
              escapeHtml(r.from[state.lang]) + ' → ' + escapeHtml(r.to[state.lang]) + '</div>' +
            '<div class="rail-row"><span class="rail-key">' + t.railDuration + '</span>' +
              escapeHtml(r.duration[state.lang]) + '</div>' +
            '<div class="rail-note">* ' + t.railNoteApprox + '</div>' +
          '</div>';
      }
      if (a.flight) {
        html += buildFlight(a, t);
      }
      if (!a.rail && !a.flight) {
        html += '<div class="popup-rail no-rail">🚌 ' + t.railNoneAvailable + '</div>';
      }
    }
    html += buildTickets(a, t);
    html += '</div>';
    return html;
  }

  function buildMetro(a, t) {
    const stations = (a.metro && a.metro.stations) || [];
    if (!stations.length) return '';
    const rows = stations.map(function (s) {
      const lineText = String(s.line);
      const lineSpans = lineText.split(/\s*\/\s*/).map(function (n) {
        return '<span class="metro-line-pill metro-line-' + cssLine(n) + '">' +
               escapeHtml(n) + '</span>';
      }).join('');
      const walk = s.walk && s.walk[state.lang] ? s.walk[state.lang] : '';
      return (
        '<div class="metro-row">' +
          '<div class="metro-row-main">' + lineSpans +
            '<span class="metro-station">' + escapeHtml(s.name[state.lang]) + '</span>' +
          '</div>' +
          (walk ? '<div class="metro-walk">' + escapeHtml(walk) + '</div>' : '') +
        '</div>'
      );
    }).join('');
    return (
      '<div class="popup-metro">' +
        '<div class="metro-head">🚇 ' + t.metroHeading + '</div>' +
        rows +
      '</div>'
    );
  }
  function cssLine(n) {
    return String(n).replace(/[^0-9a-zA-Z]/g, '');
  }

  function buildFlight(a, t) {
    const f = a.flight;
    if (!f) return '';
    const note = f.note && f.note[state.lang] ? f.note[state.lang] : '';
    return (
      '<div class="popup-flight">' +
        '<div class="flight-head">✈️ ' + t.flightHeading + '</div>' +
        '<div class="flight-row"><span class="flight-key">' + t.flightAirport + '</span>' +
          escapeHtml(f.airport[state.lang]) + '</div>' +
        '<div class="flight-row"><span class="flight-key">' + t.flightFrom + '</span>' +
          escapeHtml(f.from[state.lang]) + '</div>' +
        '<div class="flight-row"><span class="flight-key">' + t.flightDuration + '</span>' +
          escapeHtml(f.duration[state.lang]) + '</div>' +
        (note ? '<div class="flight-note">' + escapeHtml(note) + '</div>' : '') +
      '</div>'
    );
  }

  function buildTickets(a, t) {
    // Only show a tickets section when we have a hand-verified official URL.
    if (!a.tickets || !a.tickets.official) return '';
    return (
      '<div class="popup-tickets">' +
        '<div class="tickets-head">' + escapeHtml(t.ticketsHeading) + '</div>' +
        '<div class="tickets-links">' +
          '<a class="ticket-link official" href="' + escapeHtml(a.tickets.official) +
          '" target="_blank" rel="noopener noreferrer" title="' + escapeHtml(t.ticketsExternalNote) + '">' +
            '🌐 ' + escapeHtml(t.ticketsOfficial) +
          '</a>' +
        '</div>' +
      '</div>'
    );
  }

  // ---------- Utils ----------
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }
  function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

  // ---------- Init ----------
  renderChips();
  renderList();
  applyLanguage();

  if (attractions.length) {
    const bounds = L.latLngBounds(attractions.map(function (a) { return [a.lat, a.lng]; }));
    map.fitBounds(bounds, { padding: [40, 40] });
  }
})();
</script>
</body>
</html>
